name: saranghouse

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      cache_from:
        - saranghouse-web:latest
    image: saranghouse-web:latest
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
      NEXT_PUBLIC_SITE_URL: "https://saranghouse.tengerly.com"
    networks:
      - proxy
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3000/',r=>{process.exit(r.statusCode<500?0:1)}).on('error',()=>process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

networks:
  proxy:
    external: true
